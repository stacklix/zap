name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to draft-release (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-draft-release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: resolve_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag format
        run: |
          TAG="${{ steps.resolve_tag.outputs.tag }}"
          case "$TAG" in
            v*) ;;
            *)
              echo "Tag must start with 'v': $TAG" >&2
              exit 1
              ;;
          esac

      - name: Checkout tagged source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_tag.outputs.tag }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release package
        run: python3 scripts/build_workflow.py --channel release

      - name: Create draft release with generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.resolve_tag.outputs.tag }}
          draft: true
          generate_release_notes: true
          files: dist/zap.alfredworkflow
          overwrite_files: true
